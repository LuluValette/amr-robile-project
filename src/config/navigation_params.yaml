global_planner_node:
  ros__parameters:
    map_topic: /map
    odom_topic: /odom
    goal_topic: /goal_pose
    path_topic: /global_path
    waypoints_topic: /waypoints
    waypoint_markers_topic: /waypoint_markers
    robot_radius: 0.20
    safety_margin: 0.10
    occupancy_threshold: 50
    unknown_is_occupied: true
    allow_diagonal: true
    waypoint_stride: 12
    replan_period: 1.0

local_navigation_node:
  ros__parameters:
    odom_topic: /odom
    scan_topic: /scan
    waypoints_topic: /waypoints
    cmd_vel_topic: /cmd_vel
    control_rate: 10.0
    k_att: 1.2
    k_rep: 0.35
    repulsive_distance: 0.8
    goal_tolerance: 0.18
    yaw_gain: 2.0
    max_linear_speed: 0.22
    max_angular_speed: 1.2
    front_slowdown_distance: 0.50
    emergency_stop_distance: 0.16