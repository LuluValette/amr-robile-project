particle_filter_localization:
  ros__parameters:
    num_particles: 300
    random_particle_ratio: 0.05
    odom_topic: /odom
    scan_topic: /scan
    map_topic: /map
    scan_downsample_count: 24
    measurement_sigma: 0.25
    motion_noise_linear: 0.02
    motion_noise_angular: 0.04
    occupied_threshold: 50
    particles_topic: /pf_particles
    estimated_pose_topic: /pf_pose
    kidnap_weight_threshold: 0.002
    kidnap_recovery_ratio: 0.5
